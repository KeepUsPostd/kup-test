<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Brand Catalog — KeepUsPostd</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/mobile-inner.css">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    .page-wrap{max-width:960px;margin:0 auto;padding:28px 24px 60px}
    h1{font-size:1.4rem;font-weight:800;margin:0 0 4px;font-family:'Montserrat',sans-serif}
    .subtitle{font-size:.82rem;color:#888;margin-bottom:28px;font-family:'Montserrat',sans-serif}
    .back-link{display:inline-flex;align-items:center;gap:6px;font-size:.82rem;font-weight:500;color:#888;text-decoration:none;margin-bottom:16px;font-family:'Montserrat',sans-serif}
    .back-link:hover{color:var(--kup-blue,#2ea5dd)}

    /* Add Item Form */
    .form-card{background:#fff;border:1px solid #eee;border-radius:16px;padding:28px;margin-bottom:28px}
    .form-card h2{font-size:.95rem;font-weight:700;margin:0 0 16px;font-family:'Montserrat',sans-serif}
    .field{margin-bottom:14px}
    .field label{display:block;font-size:.72rem;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.4px;margin-bottom:5px;font-family:'Montserrat',sans-serif}
    .field input,.field select,.field textarea{width:100%;padding:10px 14px;border:1px solid #ddd;border-radius:10px;font-size:.88rem;font-family:'Montserrat',sans-serif;transition:border-color .2s}
    .field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--kup-blue,#2ea5dd)}
    .field textarea{resize:vertical;min-height:50px}
    .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
    .grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
    .btn-add{display:inline-flex;align-items:center;gap:8px;padding:11px 24px;background:linear-gradient(135deg,#2ea5dd,#7c3aed);color:#fff;border:none;border-radius:12px;font-size:.85rem;font-weight:700;cursor:pointer;font-family:'Montserrat',sans-serif;transition:opacity .2s}
    .btn-add:hover{opacity:.9}
    .btn-add:disabled{opacity:.5;cursor:not-allowed}

    /* Image upload preview */
    .img-upload-area{width:100%;height:120px;border:2px dashed #ddd;border-radius:12px;display:flex;align-items:center;justify-content:center;cursor:pointer;overflow:hidden;transition:border-color .2s;position:relative}
    .img-upload-area:hover{border-color:var(--kup-blue,#2ea5dd)}
    .img-upload-area img{width:100%;height:100%;object-fit:cover}
    .img-upload-area .placeholder{text-align:center;color:#bbb;font-size:.78rem;font-family:'Montserrat',sans-serif}
    .img-upload-area input{position:absolute;inset:0;opacity:0;cursor:pointer}

    /* Category filter tabs */
    .cat-tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
    .cat-tab{padding:6px 14px;border-radius:20px;font-size:.75rem;font-weight:600;cursor:pointer;border:1px solid #eee;background:#fff;font-family:'Montserrat',sans-serif;transition:all .2s}
    .cat-tab:hover{border-color:var(--kup-blue,#2ea5dd);color:var(--kup-blue,#2ea5dd)}
    .cat-tab.active{background:var(--kup-blue,#2ea5dd);color:#fff;border-color:var(--kup-blue,#2ea5dd)}

    /* Item grid */
    .items-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px}
    .item-card{background:#fff;border:1px solid #eee;border-radius:14px;overflow:hidden;transition:box-shadow .2s}
    .item-card:hover{box-shadow:0 4px 16px rgba(0,0,0,.08)}
    .item-img{width:100%;height:140px;background:#f5f6fa;display:flex;align-items:center;justify-content:center;overflow:hidden}
    .item-img img{width:100%;height:100%;object-fit:cover}
    .item-img .no-img{color:#ccc;font-size:2rem}
    .item-body{padding:12px 14px}
    .item-name{font-size:.88rem;font-weight:700;color:#1a1a1a;font-family:'Montserrat',sans-serif;margin:0 0 3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .item-desc{font-size:.72rem;color:#888;font-family:'Montserrat',sans-serif;margin:0 0 6px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
    .item-meta{display:flex;align-items:center;justify-content:space-between;gap:8px}
    .item-price{font-size:.82rem;font-weight:700;color:#1a1a1a;font-family:'Montserrat',sans-serif}
    .item-tags{font-size:.68rem;color:#888;font-family:'Montserrat',sans-serif}
    .item-pills{display:flex;gap:4px;flex-wrap:wrap;margin-top:6px}
    .item-pill{display:inline-block;padding:2px 8px;border-radius:20px;font-size:.62rem;font-weight:700;text-transform:uppercase;letter-spacing:.3px;font-family:'Montserrat',sans-serif}
    .pill-cat{background:rgba(46,165,221,.08);color:#2ea5dd}
    .pill-active{background:rgba(22,163,74,.08);color:#16a34a}
    .pill-paused{background:rgba(237,132,68,.08);color:#ed8444}
    .item-actions{display:flex;gap:6px;margin-top:8px}
    .item-btn{flex:1;padding:6px 0;text-align:center;border:1px solid #eee;border-radius:8px;font-size:.7rem;font-weight:600;cursor:pointer;background:#fff;font-family:'Montserrat',sans-serif;transition:all .15s}
    .item-btn:hover{background:#f5f5f5}
    .item-btn.danger{color:#ef4444;border-color:#fecaca}
    .item-btn.danger:hover{background:#fef2f2}
    .empty-state{text-align:center;padding:48px 20px;color:#888;font-family:'Montserrat',sans-serif}
    .empty-state p{margin:12px 0 0;font-size:.88rem}
    .item-count{font-size:.78rem;font-weight:600;color:#888;font-family:'Montserrat',sans-serif}
  </style>
</head>
<body>
  <div class="page-wrap">
    <a href="brand-home.html" class="back-link">← Back to Dashboard</a>
    <div style="display:flex;align-items:baseline;justify-content:space-between;margin-bottom:4px">
      <h1>Brand Catalog</h1>
      <span class="item-count" id="itemCount"></span>
    </div>
    <p class="subtitle">Add products, menu items, or experiences that influencers can tag in their reviews.</p>

    <!-- Add Item Form -->
    <div class="form-card" id="addForm">
      <h2>Add Catalog Item</h2>

      <div class="grid-2">
        <div>
          <div class="field">
            <label>Item Name *</label>
            <input type="text" id="itemName" placeholder="e.g. Mango Smoothie Bowl" maxlength="120">
          </div>
          <div class="field">
            <label>Description</label>
            <textarea id="itemDesc" placeholder="Brief description shown to influencers..." maxlength="300"></textarea>
          </div>
          <div class="grid-2">
            <div class="field">
              <label>Price</label>
              <input type="text" id="itemPrice" placeholder="e.g. $12.99" maxlength="20">
            </div>
            <div class="field">
              <label>Category</label>
              <input type="text" id="itemCategory" placeholder="e.g. Bowls, Skincare" maxlength="50">
            </div>
          </div>
          <div class="grid-2">
            <div class="field">
              <label>SKU / Item ID (optional)</label>
              <input type="text" id="itemSku" placeholder="Optional product code" maxlength="50">
            </div>
            <div class="field">
              <label>Product URL (optional)</label>
              <input type="url" id="itemUrl" placeholder="https://...">
            </div>
          </div>
        </div>

        <div>
          <div class="field">
            <label>Item Image</label>
            <div class="img-upload-area" id="imgUploadArea">
              <div class="placeholder" id="imgPlaceholder">
                <div style="font-size:1.5rem;margin-bottom:4px">📷</div>
                Click to upload image
              </div>
              <img id="imgPreview" style="display:none">
              <input type="file" id="itemImage" accept="image/*" onchange="previewImage(this)">
            </div>
          </div>
          <div style="margin-top:16px">
            <button class="btn-add" id="btnAdd" onclick="addItem()">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
              Add Item
            </button>
            <span id="addStatus" style="margin-left:10px;font-size:.82rem;font-family:'Montserrat',sans-serif"></span>
          </div>
        </div>
      </div>
    </div>

    <!-- Filter + Grid -->
    <div class="cat-tabs" id="catTabs"></div>
    <div class="items-grid" id="itemsGrid">
      <div class="empty-state" id="emptyState">
        <div style="font-size:3rem">📦</div>
        <p>No catalog items yet. Add your first product, dish, or experience above.</p>
      </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="/js/firebase-client.js"></script>
  <script src="/js/api.js"></script>
  <script>auth.onAuthStateChanged(function(u){if(!u)window.location.href='/pages/login.html?redirect='+encodeURIComponent(window.location.pathname+window.location.search);});</script>
  <script>
    var brandId = new URLSearchParams(window.location.search).get('brandId');
    var allItems = [];
    var allCategories = [];
    var activeFilter = null;

    function previewImage(input) {
      if (input.files && input.files[0]) {
        var reader = new FileReader();
        reader.onload = function(e) {
          document.getElementById('imgPreview').src = e.target.result;
          document.getElementById('imgPreview').style.display = 'block';
          document.getElementById('imgPlaceholder').style.display = 'none';
        };
        reader.readAsDataURL(input.files[0]);
      }
    }

    async function addItem() {
      var name = document.getElementById('itemName').value.trim();
      if (!name) return alert('Item name is required');

      var btn = document.getElementById('btnAdd');
      var status = document.getElementById('addStatus');
      btn.disabled = true;
      btn.textContent = 'Adding...';
      status.textContent = '';

      try {
        var imageUrl = null;
        var imageInput = document.getElementById('itemImage');
        if (imageInput.files[0]) {
          var form = new FormData();
          form.append('file', imageInput.files[0]);
          var uploadRes = await fetch('/api/upload', {
            method: 'POST',
            headers: { 'Authorization': 'Bearer ' + (await KUP_API.auth.getToken()) },
            body: form,
          });
          var uploadData = await uploadRes.json();
          imageUrl = uploadData.url || null;
        }

        await KUP_API.request('POST', '/api/catalog', {
          body: {
            brandId: brandId,
            name: name,
            description: document.getElementById('itemDesc').value.trim() || null,
            imageUrl: imageUrl,
            price: document.getElementById('itemPrice').value.trim() || null,
            category: document.getElementById('itemCategory').value.trim() || null,
            sku: document.getElementById('itemSku').value.trim() || null,
            externalUrl: document.getElementById('itemUrl').value.trim() || null,
          },
        });

        // Reset form
        document.getElementById('itemName').value = '';
        document.getElementById('itemDesc').value = '';
        document.getElementById('itemPrice').value = '';
        document.getElementById('itemCategory').value = '';
        document.getElementById('itemSku').value = '';
        document.getElementById('itemUrl').value = '';
        imageInput.value = '';
        document.getElementById('imgPreview').style.display = 'none';
        document.getElementById('imgPlaceholder').style.display = '';

        btn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg> Add Item';
        btn.disabled = false;
        status.textContent = 'Item added!';
        status.style.color = '#16a34a';

        loadItems();
      } catch(err) {
        btn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg> Add Item';
        btn.disabled = false;
        status.textContent = 'Error: ' + (err.message || 'Failed');
        status.style.color = '#ef4444';
      }
    }

    async function loadItems() {
      if (!brandId || typeof KUP_API === 'undefined') return;
      try {
        var res = await KUP_API.request('GET', '/api/catalog/all?brandId=' + brandId);
        allItems = (res && res.items) || [];
        allCategories = (res && res.categories) || [];
        document.getElementById('itemCount').textContent = allItems.length + ' item' + (allItems.length !== 1 ? 's' : '');
        renderCategoryTabs();
        renderItems();
      } catch(err) { console.error('Load items error:', err); }
    }

    function renderCategoryTabs() {
      var tabs = document.getElementById('catTabs');
      if (allCategories.length === 0) { tabs.innerHTML = ''; return; }
      var html = '<div class="cat-tab' + (!activeFilter ? ' active' : '') + '" onclick="filterCategory(null)">All</div>';
      allCategories.forEach(function(cat) {
        html += '<div class="cat-tab' + (activeFilter === cat ? ' active' : '') + '" onclick="filterCategory(\'' + cat.replace(/'/g,"\\'") + '\')">' + cat + '</div>';
      });
      tabs.innerHTML = html;
    }

    function filterCategory(cat) {
      activeFilter = cat;
      renderCategoryTabs();
      renderItems();
    }

    function renderItems() {
      var grid = document.getElementById('itemsGrid');
      var empty = document.getElementById('emptyState');
      var filtered = activeFilter ? allItems.filter(function(i) { return i.category === activeFilter; }) : allItems;

      if (filtered.length === 0) {
        grid.innerHTML = '';
        grid.appendChild(empty);
        empty.style.display = '';
        return;
      }

      grid.innerHTML = '';
      filtered.forEach(function(item) {
        var statusPill = item.status === 'active'
          ? '<span class="item-pill pill-active">Active</span>'
          : '<span class="item-pill pill-paused">Paused</span>';
        var catPill = item.category ? '<span class="item-pill pill-cat">' + item.category + '</span>' : '';

        var card = document.createElement('div');
        card.className = 'item-card';
        card.innerHTML =
          '<div class="item-img">' +
            (item.imageUrl ? '<img src="' + item.imageUrl + '" alt="">' : '<div class="no-img">📦</div>') +
          '</div>' +
          '<div class="item-body">' +
            '<div class="item-name">' + item.name + '</div>' +
            (item.description ? '<div class="item-desc">' + item.description + '</div>' : '') +
            '<div class="item-meta">' +
              (item.price ? '<span class="item-price">' + item.price + '</span>' : '<span></span>') +
              '<span class="item-tags">' + item.tagCount + ' tags</span>' +
            '</div>' +
            '<div class="item-pills">' + statusPill + catPill + '</div>' +
            '<div class="item-actions">' +
              (item.status === 'active'
                ? '<div class="item-btn" onclick="toggleItem(\'' + item._id + '\',\'paused\')">Pause</div>'
                : '<div class="item-btn" onclick="toggleItem(\'' + item._id + '\',\'active\')">Activate</div>') +
              '<div class="item-btn danger" onclick="removeItem(\'' + item._id + '\',\'' + item.name.replace(/'/g,"\\'") + '\')">Remove</div>' +
            '</div>' +
          '</div>';
        grid.appendChild(card);
      });
    }

    async function toggleItem(id, newStatus) {
      try {
        await KUP_API.request('PUT', '/api/catalog/' + id, { body: { status: newStatus } });
        loadItems();
      } catch(err) { alert('Could not update item'); }
    }

    async function removeItem(id, name) {
      if (!confirm('Remove "' + name + '"? Influencers will no longer be able to tag this item.')) return;
      try {
        await KUP_API.request('DELETE', '/api/catalog/' + id);
        loadItems();
      } catch(err) { alert('Could not remove item'); }
    }

    loadItems();
  </script>
</body>
</html>
