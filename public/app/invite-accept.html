<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Accept Invitation — KeepUsPostd</title>
  <link rel="icon" href="/images/kup_gradient_new_logo.png" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f7;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      max-width: 460px;
      width: 100%;
      overflow: hidden;
    }
    .card-header {
      background: linear-gradient(135deg, #2EA5DD, #707BBB);
      padding: 32px 32px 24px;
      text-align: center;
    }
    .card-header img {
      width: 120px;
      height: auto;
      display: block;
      margin: 0 auto;
    }
    .card-body {
      padding: 32px;
      text-align: center;
    }
    .brand-logo {
      width: 72px;
      height: 72px;
      border-radius: 14px;
      object-fit: cover;
      margin: 0 auto 16px;
      display: block;
      background: #f0f0f0;
    }
    .brand-initials {
      width: 72px;
      height: 72px;
      border-radius: 14px;
      background: linear-gradient(135deg, #2EA5DD, #707BBB);
      color: #fff;
      font-size: 1.6rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 16px;
    }
    .invite-headline {
      font-size: 1.3rem;
      font-weight: 700;
      color: #1a1a2e;
      margin-bottom: 8px;
      line-height: 1.3;
    }
    .invite-sub {
      font-size: 0.9rem;
      color: #666;
      margin-bottom: 24px;
      line-height: 1.5;
    }
    .role-badge {
      display: inline-block;
      background: rgba(46,165,221,0.12);
      color: #2EA5DD;
      border-radius: 20px;
      padding: 4px 14px;
      font-size: 0.82rem;
      font-weight: 600;
      margin-bottom: 24px;
    }
    .btn {
      display: block;
      width: 100%;
      padding: 14px;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      text-decoration: none;
      text-align: center;
      margin-bottom: 12px;
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.88; }
    .btn-primary { background: #2EA5DD; color: #fff; }
    .btn-secondary { background: #f0f0f4; color: #1a1a2e; }
    .btn-success { background: #22c55e; color: #fff; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .divider {
      font-size: 0.8rem;
      color: #bbb;
      margin: 4px 0 12px;
    }
    .state { display: none; }
    .state.active { display: block; }

    /* Loading spinner */
    .spinner {
      width: 40px; height: 40px;
      border: 3px solid #e0e0e0;
      border-top-color: #2EA5DD;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Success checkmark */
    .check-circle {
      width: 64px; height: 64px;
      border-radius: 50%;
      background: #22c55e;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 16px;
    }
    .check-circle svg { width: 32px; height: 32px; }

    /* Error */
    .error-icon {
      font-size: 2.5rem;
      margin-bottom: 12px;
    }
    .error-msg {
      font-size: 0.85rem;
      color: #e53e3e;
      margin-bottom: 16px;
    }
  </style>
</head>
<body>

<div class="card">
  <div class="card-header">
    <img src="/images/kup_white_new_logo_1.png" alt="KeepUsPostd" />
  </div>
  <div class="card-body">

    <!-- STATE: Loading -->
    <div id="stateLoading" class="state active">
      <div class="spinner"></div>
      <p style="color:#888;font-size:0.9rem;">Loading your invitation…</p>
    </div>

    <!-- STATE: Needs Auth (not logged in) -->
    <div id="stateAuth" class="state">
      <div id="authBrandLogo"></div>
      <p class="invite-headline" id="authHeadline">You've been invited</p>
      <p class="invite-sub" id="authSub"></p>
      <div class="role-badge" id="authRole"></div>
      <a id="btnLogin" href="#" class="btn btn-primary">Log In to Accept</a>
      <div class="divider">— or —</div>
      <a id="btnSignup" href="#" class="btn btn-secondary">Create a Free Account</a>
      <p style="font-size:0.75rem;color:#bbb;margin-top:16px;" id="authExpiry"></p>
    </div>

    <!-- STATE: Accepting (logged in, calling API) -->
    <div id="stateAccepting" class="state">
      <div class="spinner"></div>
      <p style="color:#888;font-size:0.9rem;">Accepting your invitation…</p>
    </div>

    <!-- STATE: Success -->
    <div id="stateSuccess" class="state">
      <div class="check-circle">
        <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
      </div>
      <p class="invite-headline" id="successHeadline">You're in!</p>
      <p class="invite-sub" id="successSub"></p>
      <a id="btnDashboard" href="/pages/inner/owner-account.html" class="btn btn-success">Go to Brand Dashboard →</a>
    </div>

    <!-- STATE: Error -->
    <div id="stateError" class="state">
      <div class="error-icon">⚠️</div>
      <p class="invite-headline">Something went wrong</p>
      <p class="error-msg" id="errorMsg"></p>
      <a href="/app/login.html" class="btn btn-secondary">Go to Login</a>
    </div>

    <!-- STATE: Email Mismatch -->
    <div id="stateMismatch" class="state">
      <div class="error-icon">🔒</div>
      <p class="invite-headline">Wrong account</p>
      <p class="invite-sub" id="mismatchMsg"></p>
      <button id="btnSwitchAccount" class="btn btn-primary">Sign In with the Right Account</button>
      <a href="/app/login.html" class="btn btn-secondary" style="margin-top:8px;">Go to Login</a>
    </div>

  </div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="/js/firebase-client.js"></script>
<script src="/js/api.js"></script>

<script>
(function() {
  var token = new URLSearchParams(window.location.search).get('token');
  var inviteData = null; // cached preview data

  function show(stateId) {
    document.querySelectorAll('.state').forEach(function(el) { el.classList.remove('active'); });
    var el = document.getElementById(stateId);
    if (el) el.classList.add('active');
  }

  function initials(name) {
    if (!name) return 'K';
    var words = name.trim().split(/\s+/);
    return words.length === 1
      ? words[0][0].toUpperCase()
      : words.slice(0, 3).map(function(w) { return w[0].toUpperCase(); }).join('');
  }

  function renderBrandLogo(containerId, logoUrl, brandName) {
    var el = document.getElementById(containerId);
    if (!el) return;
    if (logoUrl) {
      el.innerHTML = '<img src="' + logoUrl + '" class="brand-logo" alt="' + brandName + '" onerror="this.style.display=\'none\'">';
    } else {
      el.innerHTML = '<div class="brand-initials">' + initials(brandName) + '</div>';
    }
  }

  function formatExpiry(dateStr) {
    if (!dateStr) return '';
    var d = new Date(dateStr);
    return 'Expires ' + d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
  }

  if (!token) {
    show('stateError');
    document.getElementById('errorMsg').textContent = 'No invite token found. Please use the link from your email.';
    return;
  }

  // Step 1: Load invite preview (public — no auth needed)
  fetch('/api/brands/invite/preview?token=' + token)
    .then(function(r) {
      return r.text().then(function(text) {
        var data;
        try { data = JSON.parse(text); } catch(e) { data = { error: 'Server returned: ' + text.substring(0, 200) }; }
        return { ok: r.ok, status: r.status, data: data };
      });
    })
    .then(function(result) {
      if (!result.ok) {
        show('stateError');
        document.getElementById('errorMsg').textContent = result.data.error || ('HTTP ' + result.status);
        return;
      }

      inviteData = result.data;

      // Step 2: Check Firebase auth state
      auth.onAuthStateChanged(function(user) {
        if (!user) {
          // Not logged in — show auth options
          renderBrandLogo('authBrandLogo', inviteData.brandLogo, inviteData.brandName);
          document.getElementById('authHeadline').textContent = 'Join ' + inviteData.brandName;
          document.getElementById('authSub').textContent =
            inviteData.inviterName + ' invited you to manage ' + inviteData.brandName + ' on KeepUsPostd.';
          document.getElementById('authRole').textContent = inviteData.role.charAt(0).toUpperCase() + inviteData.role.slice(1);
          document.getElementById('authExpiry').textContent = formatExpiry(inviteData.expiresAt);

          var encodedReturn = encodeURIComponent('/app/invite-accept.html?token=' + token);
          document.getElementById('btnLogin').href = '/app/login.html?redirect=' + encodedReturn;
          document.getElementById('btnSignup').href = '/app/creator-signup.html?redirect=' + encodedReturn;
          show('stateAuth');
        } else {
          // Logged in — go straight to accept
          acceptInvite(user);
        }
      });
    })
    .catch(function(err) {
      show('stateError');
      document.getElementById('errorMsg').textContent = 'Network error: ' + (err && err.message ? err.message : String(err));
    });

  function acceptInvite(user) {
    show('stateAccepting');
    user.getIdToken().then(function(idToken) {
      return fetch('/api/brands/invite/accept', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer ' + idToken,
        },
        body: JSON.stringify({ token: token }),
      });
    })
    .then(function(r) { return r.json().then(function(d) { return { ok: r.ok, status: r.status, data: d }; }); })
    .then(function(result) {
      if (result.ok) {
        // Success
        document.getElementById('successHeadline').textContent = 'You\'re in! 🎉';
        document.getElementById('successSub').textContent =
          'You now have ' + (result.data.role.charAt(0).toUpperCase() + result.data.role.slice(1)) +
          ' access to ' + result.data.brandName + '.';
        document.getElementById('btnDashboard').href =
          '/pages/inner/owner-account.html?brandId=' + result.data.brandId;
        show('stateSuccess');
      } else if (result.status === 403) {
        // Email mismatch
        document.getElementById('mismatchMsg').textContent = result.data.detail || result.data.error;
        document.getElementById('btnSwitchAccount').addEventListener('click', function() {
          auth.signOut().then(function() {
            window.location.href = '/app/login.html?redirect=' + encodeURIComponent('/app/invite-accept.html?token=' + token);
          });
        });
        show('stateMismatch');
      } else {
        show('stateError');
        document.getElementById('errorMsg').textContent = result.data.error || 'Could not accept invitation.';
      }
    })
    .catch(function() {
      show('stateError');
      document.getElementById('errorMsg').textContent = 'Network error. Please try again.';
    });
  }
})();
</script>
</body>
</html>
