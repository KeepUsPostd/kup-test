    body { background: #fff; color: #111; min-height: 100vh; overflow-x: hidden; }

    /* ---- Top nav bar (Contra-style) ---- */
    .cd-topbar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      background: rgba(255,255,255,0.92); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid #f0f0f0;
      padding: 12px 32px; display: flex; align-items: center; justify-content: space-between;
    }
    .cd-topbar-left {
      display: flex; align-items: center; gap: 12px;
    }
    .cd-back-btn {
      display: inline-flex; align-items: center; gap: 6px;
      color: #666; font-size: 0.82rem; font-weight: 600;
      text-decoration: none; transition: color 0.2s;
      font-family: var(--kup-font);
    }
    .cd-back-btn:hover { color: #111; }
    .cd-topbar-logo { height: 22px; }
    .cd-topbar-ctas { display: flex; align-items: center; gap: 12px; }
    .cd-topbar-login {
      font-size: 0.8rem; font-weight: 600; color: #444;
      text-decoration: none; font-family: var(--kup-font);
    }
    .cd-topbar-login:hover { color: #111; }
    .cd-topbar-signup {
      font-size: 0.78rem; font-weight: 700; padding: 8px 22px;
      border-radius: 24px; text-decoration: none; color: #fff;
      background: #111; transition: opacity 0.2s;
      font-family: var(--kup-font);
    }
    .cd-topbar-signup:hover { opacity: 0.8; color: #fff; }

    /* ---- Main split layout ---- */
    .cd-page {
      display: flex; min-height: 100vh; padding-top: 52px;
      justify-content: center; /* center both sections horizontally */
      max-width: 1080px; margin: 0 auto;
    }

    /* Left: Phone-shaped card */
    .cd-main {
      flex: 0 0 auto;
      display: flex; flex-direction: column;
      align-items: center;
      padding: 20px 20px 20px 0;
    }

    /* Right: Sidebar — hugs the phone */
    .cd-sidebar {
      width: 340px; flex-shrink: 0;
      padding: 20px 12px 32px 20px; position: sticky; top: 52px;
      height: calc(100vh - 52px); overflow-y: auto;
      border-left: 1px solid #f0f0f0;
    }

    /* ---- Phone-shaped card (no casing, just rounded content) ---- */
    .cd-phone-card {
      max-width: 400px; width: 100%;
      background: #fff; border-radius: 36px;
      overflow: hidden; overflow-y: auto;
      box-shadow: 0 4px 40px rgba(0,0,0,0.06);
      border: 1px solid #f0f0f0;
      height: calc(100vh - 92px);
      scrollbar-width: none;
    }
    .cd-phone-card::-webkit-scrollbar { display: none; }

    /* Hero image header (matches clicked card) */
    .cd-hero-img {
      width: 100%; aspect-ratio: 16/9; object-fit: cover;
      display: block;
    }
    .cd-hero-overlay {
      position: relative;
    }
    .cd-hero-overlay::after {
      content: ''; position: absolute; bottom: 0; left: 0; right: 0;
      height: 80px;
      background: linear-gradient(transparent, #fff);
    }
    .cd-hero-back {
      position: absolute; top: 16px; left: 16px; z-index: 2;
      width: 36px; height: 36px; border-radius: 50%;
      background: rgba(255,255,255,0.85); backdrop-filter: blur(8px);
      display: flex; align-items: center; justify-content: center;
      color: #333; text-decoration: none; font-size: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      transition: background 0.2s;
    }
    .cd-hero-back:hover { background: #fff; color: #111; }
    .cd-hero-platform {
      position: absolute; top: 16px; right: 16px; z-index: 2;
      padding: 5px 12px; border-radius: 16px;
      background: rgba(255,255,255,0.85); backdrop-filter: blur(8px);
      font-size: 0.7rem; font-weight: 600; color: #333;
      font-family: var(--kup-font);
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    .cd-hero-participants {
      position: absolute; bottom: 24px; left: 20px; z-index: 2;
      display: flex; align-items: center; gap: 8px;
    }
    .cd-hero-participants img {
      width: 28px; height: 28px; border-radius: 50%;
      border: 2px solid #fff; margin-left: -8px;
    }
    .cd-hero-participants img:first-child { margin-left: 0; }
    .cd-hero-participants span {
      font-size: 0.7rem; color: #fff; font-weight: 500;
      text-shadow: 0 1px 4px rgba(0,0,0,0.3);
      font-family: var(--kup-font);
    }

    /* Phone content body */
    .cd-phone-body {
      padding: 0 24px 32px; position: relative; margin-top: -20px; z-index: 1;
    }

    /* Creator profile section inside phone */
    .cd-profile-row {
      display: flex; align-items: center; gap: 14px; margin-bottom: 20px;
    }
    .cd-profile-avatar {
      width: 52px; height: 52px; border-radius: 50%;
      object-fit: cover; border: 3px solid #fff;
      box-shadow: 0 2px 12px rgba(0,0,0,0.1);
    }
    .cd-profile-name {
      font-size: 1.1rem; font-weight: 800; color: #111;
      font-family: var(--kup-font); line-height: 1.2;
    }
    .cd-profile-handle {
      font-size: 0.78rem; color: #999; font-family: var(--kup-font);
    }

    /* Badges inside phone */
    .cd-phone-badges {
      display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 18px;
    }
    .cd-phone-badge {
      font-size: 0.65rem; font-weight: 600; padding: 4px 12px;
      border-radius: 16px; background: #f5f5f5; color: #555;
      font-family: var(--kup-font);
    }
    .cd-phone-badge-tier {
      background: var(--kup-gradient); color: #fff;
    }

    /* Stats row inside phone */
    .cd-phone-stats {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;
      margin-bottom: 20px;
    }
    .cd-phone-stat {
      text-align: center; background: #fafafa; border-radius: 12px;
      padding: 12px 8px;
    }
    .cd-phone-stat-val {
      font-size: 1.05rem; font-weight: 800; color: #111; display: block;
      font-family: var(--kup-font);
    }
    .cd-phone-stat-lbl {
      font-size: 0.55rem; color: #999; text-transform: uppercase;
      letter-spacing: 0.5px; font-family: var(--kup-font);
    }

    /* Caption / post content */
    .cd-phone-caption {
      font-size: 0.85rem; color: #444; line-height: 1.7;
      margin-bottom: 20px; font-family: var(--kup-font);
    }

    /* Engagement row */
    .cd-phone-engagement {
      display: flex; gap: 16px; align-items: center;
      padding: 14px 0; border-top: 1px solid #f0f0f0; border-bottom: 1px solid #f0f0f0;
      margin-bottom: 20px;
    }
    .cd-phone-eng-item {
      display: flex; align-items: center; gap: 5px;
      font-size: 0.78rem; color: #666; font-family: var(--kup-font);
    }
    .cd-phone-eng-item strong { color: #111; font-weight: 700; }

    /* Tags inside phone */
    .cd-phone-tags {
      display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 20px;
    }
    .cd-phone-tag {
      font-size: 0.65rem; font-weight: 500; padding: 4px 10px;
      border-radius: 12px; background: #f5f5f7; color: #2EA5DD;
      font-family: var(--kup-font);
    }

    /* Brand partnership in phone */
    .cd-phone-brand {
      display: flex; align-items: center; gap: 12px;
      background: #fafafa; border-radius: 14px; padding: 14px 16px;
      margin-bottom: 20px;
    }
    .cd-phone-brand-logo {
      width: 36px; height: 36px; border-radius: 10px;
      background: var(--kup-gradient); display: flex; align-items: center;
      justify-content: center; font-size: 0.85rem; font-weight: 800; color: #fff;
      flex-shrink: 0;
    }
    .cd-phone-brand-name {
      font-size: 0.8rem; font-weight: 700; color: #111; font-family: var(--kup-font);
    }
    .cd-phone-brand-sub {
      font-size: 0.65rem; color: #999; font-family: var(--kup-font);
    }
    .cd-phone-brand-status {
      margin-left: auto; font-size: 0.6rem; font-weight: 700; color: #16a34a;
      background: #f0fdf4; padding: 4px 10px; border-radius: 8px;
    }

    /* KUP app CTA buttons inside phone */
    .cd-phone-actions {
      display: flex; gap: 8px; flex-wrap: wrap;
    }
    .cd-phone-action-btn {
      flex: 1; min-width: 100px; padding: 10px 14px;
      border-radius: 12px; border: 1px solid #e8e8e8; background: #fff;
      font-size: 0.7rem; font-weight: 600; color: #333;
      font-family: var(--kup-font); cursor: pointer; text-align: center;
      transition: background 0.15s;
    }
    .cd-phone-action-btn:hover { background: #f8f8f8; }

    /* ======== RIGHT SIDEBAR ======== */
    .cd-sb-section { margin-bottom: 28px; }
    .cd-sb-label {
      font-size: 0.6rem; text-transform: uppercase; letter-spacing: 1px;
      color: #999; font-weight: 700; margin-bottom: 12px;
      font-family: var(--kup-font);
    }
    .cd-sb-title {
      font-size: 1.5rem; font-weight: 800; color: #111;
      line-height: 1.15; margin-bottom: 4px;
      font-family: var(--kup-font);
    }
    .cd-sb-handle {
      font-size: 0.82rem; color: #999; margin-bottom: 16px;
      font-family: var(--kup-font);
    }
    .cd-sb-location {
      font-size: 0.78rem; color: #888; display: flex; align-items: center; gap: 5px;
      margin-bottom: 20px; font-family: var(--kup-font);
    }

    /* Sidebar badges */
    .cd-sb-badges {
      display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 20px;
    }
    .cd-sb-badge {
      font-size: 0.65rem; font-weight: 600; padding: 5px 12px;
      border-radius: 16px; background: #f5f5f5; color: #555;
      font-family: var(--kup-font);
    }

    /* Sidebar stats */
    .cd-sb-stats {
      display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
      margin-bottom: 20px;
    }
    .cd-sb-stat {
      background: #fafafa; border-radius: 12px; padding: 14px 12px;
      text-align: center;
    }
    .cd-sb-stat-val {
      font-size: 1.1rem; font-weight: 800; color: #111; display: block;
      font-family: var(--kup-font);
    }
    .cd-sb-stat-lbl {
      font-size: 0.55rem; color: #999; text-transform: uppercase;
      letter-spacing: 0.5px; font-family: var(--kup-font);
    }

    /* Sidebar bio */
    .cd-sb-bio {
      font-size: 0.82rem; color: #666; line-height: 1.65;
      margin-bottom: 24px; font-family: var(--kup-font);
    }

    /* How it works (sidebar) */
    .cd-sb-steps { margin-bottom: 24px; }
    .cd-sb-step {
      display: flex; gap: 12px; align-items: flex-start;
      margin-bottom: 16px; position: relative;
    }
    .cd-sb-step:last-child { margin-bottom: 0; }
    .cd-sb-step-num {
      width: 28px; height: 28px; border-radius: 8px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.7rem; font-weight: 800; color: #fff;
      font-family: var(--kup-font);
    }
    .cd-sb-step-num.s1 { background: #2EA5DD; }
    .cd-sb-step-num.s2 { background: #8B5CF6; }
    .cd-sb-step-num.s3 { background: #10B981; }
    .cd-sb-step-num.s4 { background: #F59E0B; }
    .cd-sb-step-title {
      font-size: 0.75rem; font-weight: 700; color: #111;
      font-family: var(--kup-font); margin-bottom: 2px;
    }
    .cd-sb-step-desc {
      font-size: 0.68rem; color: #888; line-height: 1.45;
      font-family: var(--kup-font);
    }

    /* Cost comparison (sidebar) */
    .cd-sb-cost {
      display: flex; gap: 12px; margin-bottom: 20px;
    }
    .cd-sb-cost-col {
      flex: 1; text-align: center; background: #fafafa;
      border-radius: 12px; padding: 14px 10px;
    }
    .cd-sb-cost-col.old { opacity: 0.5; }
    .cd-sb-cost-label {
      font-size: 0.55rem; text-transform: uppercase; letter-spacing: 0.5px;
      color: #999; margin-bottom: 4px; font-family: var(--kup-font);
    }
    .cd-sb-cost-price {
      font-size: 1.2rem; font-weight: 800; font-family: var(--kup-font);
    }
    .cd-sb-cost-col.old .cd-sb-cost-price {
      color: #bbb; text-decoration: line-through;
    }
    .cd-sb-cost-col.kup .cd-sb-cost-price {
      background: var(--kup-gradient);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .cd-sb-cost-detail {
      font-size: 0.58rem; color: #aaa; margin-top: 2px;
      font-family: var(--kup-font);
    }

    /* Trust signals (sidebar) */
    .cd-sb-trust {
      display: flex; flex-direction: column; gap: 10px; margin-bottom: 24px;
    }
    .cd-sb-trust-item {
      display: flex; align-items: center; gap: 8px;
      font-size: 0.7rem; color: #666; font-family: var(--kup-font);
    }
    .cd-sb-trust-icon {
      width: 24px; height: 24px; border-radius: 6px;
      background: #f0fdf4; color: #10B981;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.75rem;
    }

    /* Sidebar CTA */
    .cd-sb-cta {
      display: block; width: 100%; padding: 12px 20px; text-align: center;
      border-radius: 24px; text-decoration: none; color: #fff;
      background: #111; font-size: 0.8rem; font-weight: 700;
      font-family: var(--kup-font); transition: opacity 0.2s;
      margin-bottom: 10px;
    }
    .cd-sb-cta:hover { opacity: 0.8; color: #fff; }
    .cd-sb-cta-ghost {
      display: block; width: 100%; padding: 12px 20px; text-align: center;
      border-radius: 24px; text-decoration: none; color: #555;
      background: #f5f5f5; font-size: 0.8rem; font-weight: 600;
      font-family: var(--kup-font); transition: background 0.2s;
    }
    .cd-sb-cta-ghost:hover { background: #eee; color: #333; }

    /* Divider */
    .cd-sb-divider {
      height: 1px; background: #f0f0f0; margin: 24px 0;
    }

    /* Sidebar scrollbar styling */
    .cd-sidebar::-webkit-scrollbar { width: 4px; }
    .cd-sidebar::-webkit-scrollbar-thumb { background: #e0e0e0; border-radius: 4px; }

    /* ---- Animations ---- */
    .cd-main { animation: cd-fade-up 0.5s ease both; }
    .cd-sidebar { animation: cd-fade-up 0.5s ease 0.12s both; }
    @keyframes cd-fade-up {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ---- Responsive ---- */
    @media (max-width: 991px) {
      .cd-page { flex-direction: column; }
      .cd-main {
        width: 100%; border-right: none; border-bottom: 1px solid #f0f0f0;
        align-items: center; padding: 16px;
      }
      .cd-sidebar {
        width: 100%; position: relative; top: auto;
        height: auto; padding: 32px 24px 60px;
      }
      .cd-phone-card {
        max-width: 400px; height: auto; min-height: 0;
        border-radius: 32px;
      }
      .cd-sb-stats { grid-template-columns: repeat(4, 1fr); }
    }
    @media (max-width: 576px) {
      .cd-topbar { padding: 10px 16px; }
      .cd-phone-card { border-radius: 24px; margin: 8px 12px; }
      .cd-hero-img { aspect-ratio: 16/10; }
      .cd-phone-body { padding: 0 16px 24px; }
      .cd-sb-stats { grid-template-columns: repeat(2, 1fr); }
      .cd-phone-stats { grid-template-columns: repeat(3, 1fr); gap: 6px; }
    }
  </style>
</head>
