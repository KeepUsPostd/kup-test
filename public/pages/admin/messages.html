<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Favicon / app icons (see scripts/inject-favicons.js) -->
  <link rel="icon" type="image/png" sizes="32x32" href="/images/favicon/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/images/favicon/favicon-16x16.png">
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="apple-touch-icon" sizes="180x180" href="/images/favicon/apple-touch-icon.png">
  <link rel="manifest" href="/site.webmanifest">
  <meta name="theme-color" content="#2EA5DD">
  <title>Messages — KUP Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/admin.css">
  <style>
    .msg-row {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 12px;
      padding: 14px 20px;
      border-bottom: 1px solid #f0f0f0;
      align-items: center;
      cursor: pointer;
      transition: background 0.1s;
    }
    .msg-row:hover { background: #fafafa; }
    .msg-row.unread { background: #F0F7FF; }
    .msg-row.unread:hover { background: #E5F0FA; }
    .msg-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--kup-blue);
    }
    .msg-dot.read { background: transparent; }
    .msg-title { font-size: 13px; font-weight: 600; margin-bottom: 2px; }
    .msg-preview { font-size: 12px; color: #999; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 500px; }
    .msg-time { font-size: 11px; color: #999; white-space: nowrap; }
    .msg-type-pill {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      margin-left: 8px;
    }
    .msg-type-pill.content { background: #DBEAFE; color: #1D4ED8; }
    .msg-type-pill.payment { background: #D1FAE5; color: #059669; }
    .msg-type-pill.campaign { background: #FEF3C7; color: #D97706; }
    .msg-type-pill.system { background: #F3E8FF; color: #7C3AED; }
    .msg-type-pill.account { background: #FEE2E2; color: #DC2626; }

    .msg-detail {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 300;
      align-items: center;
      justify-content: center;
    }
    .msg-detail.open { display: flex; }
    .msg-detail-card {
      background: #fff;
      border-radius: 16px;
      max-width: 550px;
      width: 90%;
      max-height: 70vh;
      overflow-y: auto;
      padding: 24px;
    }
  </style>
</head>
<body>
  <button class="mobile-toggle" onclick="document.querySelector('.admin-sidebar').classList.toggle('open')">&#9776;</button>

  <nav class="admin-sidebar">
    <div class="sidebar-logo">
      <img src="/assets/images/kup_WHT_new_logo.png" alt="KUP" onerror="this.style.display='none'">
      <span>KeepUsPostd</span><span class="admin-badge">Admin</span>
    </div>
    <div class="sidebar-nav">
      <div class="nav-section-label">Overview</div>
      <a href="/pages/admin/dashboard.html"><span class="nav-icon">&#9632;</span> Dashboard</a>
      <div class="nav-section-label">Management</div>
      <a href="/pages/admin/users.html"><span class="nav-icon">&#9787;</span> Users</a>
      <a href="/pages/admin/brands.html"><span class="nav-icon">&#9733;</span> Brands</a>
      <a href="/pages/admin/content.html"><span class="nav-icon">&#9998;</span> Content</a>
      <a href="/pages/admin/verifications.html"><span class="nav-icon">&#10003;</span> Verifications <span class="nav-badge" id="navBadgeVerifications" style="display:none"></span></a>
      <div class="nav-section-label">Financial</div>
      <a href="/pages/admin/financials.html"><span class="nav-icon">&#36;</span> Financials</a>
      <div class="nav-section-label">Engagement</div>
      <a href="/pages/admin/reviews.html"><span class="nav-icon">&#9733;</span> Reviews</a>
      <a href="/pages/admin/messages.html" class="active"><span class="nav-icon">&#9993;</span> Messages<span class="nav-badge" id="navBadge" style="display:none"></span></a>
    </div>
    <div class="sidebar-footer"><a href="/pages/inner/brand-home.html">&larr; Back to Dashboard</a></div>
  </nav>

  <div class="admin-main">
    <header class="admin-header">
      <h2>Messages</h2>
      <div class="header-actions">
        <button class="btn btn-secondary btn-sm" onclick="markAllRead()">Mark All Read</button>
        <button class="btn btn-secondary btn-sm" onclick="loadMessages()">Refresh</button>
        <div class="header-user"><div class="user-avatar" id="userInitials">ST</div></div>
      </div>
    </header>

    <div class="admin-content">
      <!-- Quick filters -->
      <div class="kpi-grid" style="grid-template-columns:repeat(2,1fr);margin-bottom:20px">
        <div class="kpi-card" style="cursor:pointer" onclick="toggleUnread(false)">
          <div class="kpi-label">Total Messages</div>
          <div class="kpi-value" id="kpiTotal">—</div>
        </div>
        <div class="kpi-card" style="cursor:pointer;border:2px solid var(--kup-blue)" onclick="toggleUnread(true)">
          <div class="kpi-label">Unread</div>
          <div class="kpi-value" id="kpiUnread" style="color:var(--kup-blue)">—</div>
        </div>
      </div>

      <!-- Message List -->
      <div class="admin-panel-section">
        <div class="section-header">
          <h3>Inbox <span id="msgCount" style="color:#999;font-weight:400"></span></h3>
          <div class="section-actions">
            <select id="unreadFilter" onchange="loadMessages()" style="padding:6px 10px;border:1px solid #e0e0e0;border-radius:6px;font-size:12px;font-family:inherit">
              <option value="">All Messages</option>
              <option value="true">Unread Only</option>
            </select>
          </div>
        </div>
        <div id="messageList">
          <div class="empty-state"><p>Loading messages...</p></div>
        </div>
        <div class="pagination" id="pagination"></div>
      </div>
    </div>
  </div>

  <!-- Message Detail Modal -->
  <div class="msg-detail" id="msgModal">
    <div class="msg-detail-card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
        <h3 id="msgModalTitle" style="font-size:16px;font-weight:700">Message</h3>
        <button onclick="closeDetail()" style="background:none;border:none;font-size:20px;cursor:pointer">&times;</button>
      </div>
      <div id="msgModalBody" style="font-size:14px;line-height:1.6;color:#444"></div>
      <div id="msgModalMeta" style="margin-top:16px;font-size:12px;color:#999;border-top:1px solid #f0f0f0;padding-top:12px"></div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="/js/firebase-client.js"></script>

  <script>
    let authToken = null, currentPage = 1;

    auth.onAuthStateChanged(async (user) => {
      if (!user) { window.location.href = '/pages/login.html'; return; }
      authToken = await user.getIdToken();
      document.getElementById('userInitials').textContent = (user.email || '').substring(0, 2).toUpperCase();
      loadMessages();
    });

    async function apiFetch(path, opts) {
      const res = await fetch('/api/admin-panel' + path, {
        ...opts,
        headers: { 'Authorization': 'Bearer ' + authToken, 'Content-Type': 'application/json', ...(opts?.headers || {}) },
      });
      if (!res.ok) throw new Error('API error');
      return res.json();
    }

    function toggleUnread(unreadOnly) {
      document.getElementById('unreadFilter').value = unreadOnly ? 'true' : '';
      loadMessages();
    }

    async function loadMessages(page) {
      currentPage = page || 1;
      const unread = document.getElementById('unreadFilter').value;

      let url = `/messages?page=${currentPage}&limit=20`;
      if (unread) url += `&unread=${unread}`;

      try {
        const data = await apiFetch(url);
        document.getElementById('kpiTotal').textContent = data.pagination.total;
        document.getElementById('kpiUnread').textContent = data.unreadCount;
        document.getElementById('msgCount').textContent = `(${data.pagination.total})`;

        if (data.unreadCount > 0) {
          const badge = document.getElementById('navBadge');
          badge.textContent = data.unreadCount;
          badge.style.display = 'inline';
        }

        const list = document.getElementById('messageList');
        if (data.messages.length === 0) {
          list.innerHTML = '<div class="empty-state"><div class="empty-icon">&#9993;</div><p>No messages</p></div>';
          document.getElementById('pagination').innerHTML = '';
          return;
        }

        list.innerHTML = data.messages.map(m => `
          <div class="msg-row ${m.read ? '' : 'unread'}" onclick="openDetail(${JSON.stringify(m).replace(/"/g, '&quot;')})">
            <div class="msg-dot ${m.read ? 'read' : ''}"></div>
            <div>
              <div class="msg-title">
                ${m.title}
                <span class="msg-type-pill ${m.type || 'system'}">${m.type || 'system'}</span>
              </div>
              <div class="msg-preview">${m.message}</div>
            </div>
            <div class="msg-time">${timeAgo(m.createdAt)}</div>
          </div>
        `).join('');

        const p = data.pagination;
        let pHtml = `<button ${p.page <= 1 ? 'disabled' : ''} onclick="loadMessages(${p.page - 1})">&laquo;</button>`;
        for (let i = 1; i <= Math.min(p.pages, 10); i++) {
          pHtml += `<button class="${i === p.page ? 'active' : ''}" onclick="loadMessages(${i})">${i}</button>`;
        }
        pHtml += `<button ${p.page >= p.pages ? 'disabled' : ''} onclick="loadMessages(${p.page + 1})">&raquo;</button>`;
        document.getElementById('pagination').innerHTML = pHtml;
      } catch (e) {
        console.error('Messages error:', e);
      }
    }

    function openDetail(msg) {
      document.getElementById('msgModalTitle').textContent = msg.title;
      document.getElementById('msgModalBody').textContent = msg.message;
      document.getElementById('msgModalMeta').innerHTML = `
        <strong>Type:</strong> ${msg.type || 'system'} &nbsp;|&nbsp;
        <strong>Received:</strong> ${new Date(msg.createdAt).toLocaleString()} &nbsp;|&nbsp;
        <strong>Status:</strong> ${msg.read ? 'Read' : 'Unread'}
        ${msg.link ? ` &nbsp;|&nbsp; <a href="${msg.link}" style="color:var(--kup-blue)">View related</a>` : ''}
      `;
      document.getElementById('msgModal').classList.add('open');

      // Mark as read via notifications API
      if (!msg.read && msg._id) {
        fetch(`/api/notifications/${msg._id}/read`, {
          method: 'PUT',
          headers: { 'Authorization': 'Bearer ' + authToken },
        }).catch(() => {});
      }
    }

    function closeDetail() {
      document.getElementById('msgModal').classList.remove('open');
    }

    async function markAllRead() {
      try {
        await fetch('/api/notifications/read-all', {
          method: 'PUT',
          headers: { 'Authorization': 'Bearer ' + authToken },
        });
        loadMessages(currentPage);
      } catch (e) {
        alert('Failed to mark all as read');
      }
    }

    function timeAgo(dateStr) {
      const diff = Date.now() - new Date(dateStr).getTime();
      const mins = Math.floor(diff / 60000);
      if (mins < 1) return 'just now';
      if (mins < 60) return mins + 'm ago';
      const hours = Math.floor(mins / 60);
      if (hours < 24) return hours + 'h ago';
      const days = Math.floor(hours / 24);
      if (days < 7) return days + 'd ago';
      return new Date(dateStr).toLocaleDateString();
    }
  </script>
</body>
</html>
