## KUP Production — Nginx Reverse Proxy Config
## Place at: /etc/nginx/sites-available/keepuspostd
## Symlink: ln -s /etc/nginx/sites-available/keepuspostd /etc/nginx/sites-enabled/
## Then: sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name keepuspostd.com www.keepuspostd.com;

    # Redirect HTTP → HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name keepuspostd.com www.keepuspostd.com;

    # SSL certificates (Let's Encrypt via certbot)
    # Run: sudo certbot --nginx -d keepuspostd.com -d www.keepuspostd.com
    ssl_certificate /etc/letsencrypt/live/keepuspostd.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/keepuspostd.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Redirect www to non-www
    if ($host = www.keepuspostd.com) {
        return 301 https://keepuspostd.com$request_uri;
    }

    # Max upload size (for content submissions)
    client_max_body_size 50M;

    # Proxy to Node.js app
    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 90s;
    }

    # Cache static assets
    location ~* \.(jpg|jpeg|png|gif|ico|svg|webp|woff|woff2|ttf|eot|css)$ {
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 1000;
}
